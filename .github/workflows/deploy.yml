name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install --no-audit --no-fund

      - run: npm run build
        env:
          VITE_SUPABASE_URL: 'https://lanmmtaovazvsxvlclfr.supabase.co'
          VITE_SUPABASE_PUBLISHABLE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxhbm1tdGFvdmF6dnN4dmxjbGZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NTQ3NDUsImV4cCI6MjA4ODAzMDc0NX0.EaZnACevKhwQRuXkaQwNfiFmRs15TWm-cfI_rvAo448'

      - run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
